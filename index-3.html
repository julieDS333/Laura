<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura's Quest 🏴‍☠️</title>

<style>
body { background:#0d0d0d; color:#f5f0e8; font-family:sans-serif; text-align:center; }
.screen { display:none; padding:40px; }
.screen.active { display:block; }
img { max-width:300px; margin:20px auto; display:block; }
button { padding:10px 20px; margin:10px; cursor:pointer; }
</style>
</head>

<body>

<!-- SCREEN 0 -->
<div class="screen active" id="screen-0">
  <h1>Laura's Quest 🏴‍☠️</h1>
  <button onclick="goToScreen(1)">START</button>
</div>

<!-- SCREEN 1 -->
<div class="screen" id="screen-1">
  <h2>Flag Quiz</h2>
  <img id="flagImg">
  <div id="quizOptions"></div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen-2">
  <h2>Catch the metro card</h2>
  <div id="game-area"></div>
  <p>Score: <span id="score">0</span></p>
</div>

<script>
const BASE = './';

/* ---------- NAV ---------- */
function goToScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');

  if(n===1) initQuiz();
  if(n===2) initGame();
}

/* ---------- QUIZ ---------- */
const flags = [
  {
    img: BASE+'sao_tome.png',
    answer:'São Tomé & Príncipe',
    options:['São Tomé & Príncipe','Senegal','Cameroon','Togo']
  },
  {
    img: BASE+'montserrat.png',
    answer:'Montserrat',
    options:['Montserrat','Cayman Islands','British Virgin Islands','Bermuda']
  },
  {
    img: BASE+'aceh.png',
    answer:'Aceh, Indonesia',
    options:['Aceh, Indonesia','Saudi Arabia','Malaysia','Pakistan']
  }
];

let currentFlag = 0;

function initQuiz(){
  currentFlag = 0;
  renderFlag();
}

function renderFlag(){
  const f = flags[currentFlag];
  const img = document.getElementById('flagImg');

  img.src = f.img;

  // debug
  img.onerror = () => console.log('FAILED:', img.src);

  const opts = document.getElementById('quizOptions');
  opts.innerHTML = '';

  f.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.onclick = ()=>{
      if(opt === f.answer){
        currentFlag++;
        if(currentFlag < flags.length){
          renderFlag();
        } else {
          goToScreen(2);
        }
      } else {
        alert('wrong 😈');
      }
    };
    opts.appendChild(btn);
  });
}

/* ---------- GAME ---------- */
const ITEMS = [
  {src:BASE+'choco.png', isMetro:false}, // ✅ FIXED
  {src:BASE+'cubbyhole.png', isMetro:false},
  {src:BASE+'your_face.png', isMetro:false},
  {src:BASE+'jolly_roger.png', isMetro:false},
  {src:BASE+'sao_tome.png', isMetro:false},
  {src:BASE+'montserrat.png', isMetro:false},
  {src:BASE+'aceh.png', isMetro:false},
  {src:BASE+'uhaul.png', isMetro:false},
  {src:BASE+'metro_card.png', isMetro:true},
];

let score = 0;

function initGame(){
  score = 0;
  document.getElementById('score').textContent = score;

  const area = document.getElementById('game-area');
  area.innerHTML = '';

  spawnMetro();
}

function spawnMetro(){
  const area = document.getElementById('game-area');

  const metroData = ITEMS.find(i => i.isMetro); // ✅ FIXED
  const el = document.createElement('img');

  el.src = metroData.src;

  el.onerror = () => console.log('FAILED:', el.src);

  el.style.position = 'absolute';
  el.style.left = Math.random()*80 + '%';
  el.style.top = Math.random()*60 + '%';
  el.style.width = '100px';

  el.onclick = ()=>{
    score++;
    document.getElementById('score').textContent = score;
    el.remove();

    if(score >= 3){
      alert('YOU WIN 🎉');
    } else {
      spawnMetro();
    }
  };

  area.appendChild(el);
}
</script>

</body>
</html>
