<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laura's Quest 🏴‍☠️</title>

<style>
body {
  background:#0d0d0d;
  color:#f5f0e8;
  font-family:sans-serif;
  text-align:center;
}

.screen { display:none; padding:40px; }
.screen.active { display:block; }

img {
  width:250px;
  margin:20px auto;
  display:block;
  border:3px solid gold;
}
button {
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SCREEN 0 -->
<div class="screen active" id="s0">
  <h1>Laura's Quest 🏴‍☠️</h1>
  <button onclick="show(1)">START</button>
</div>

<!-- SCREEN 1 -->
<div class="screen" id="s1">
  <h2>Flag 1</h2>
  <img src="./sao_tome.png">
  <button onclick="show(2)">Next</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <h2>Flag 2</h2>
  <img src="./montserrat.png">
  <button onclick="show(3)">Next</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <h2>Flag 3</h2>
  <img src="./aceh.png">
  <button onclick="show(4)">Next</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
  <h2>🎉 YOU MADE IT 🎉</h2>
  <img src="./metro_card.png">
  <p>Password: <b>BOA SORTE</b></p>
</div>

<script>
function show(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}
</script>

</body>
</html>
